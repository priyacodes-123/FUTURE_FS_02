<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:
    linear-gradient(
    135deg,
    #020617,
    #0f172a,
    #0c4a6e,
    #052e16);

    background-size:400% 400%;

    animation:bgMove 10s ease infinite;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;
}

@keyframes bgMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

.login-box{

    width:400px;

    padding:40px;

    border-radius:20px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.1);

    box-shadow:0 0 25px rgba(56,189,248,0.25);

    animation:glow 3s infinite;
}

@keyframes glow{

    0%{
        box-shadow:0 0 15px rgba(34,197,94,0.2);
    }

    50%{
        box-shadow:0 0 30px rgba(56,189,248,0.5);
    }

    100%{
        box-shadow:0 0 15px rgba(34,197,94,0.2);
    }
}

h2{

    text-align:center;

    margin-bottom:30px;

    color:#38bdf8;

    font-size:32px;

    text-shadow:0 0 10px #38bdf8;
}

.input-group{

    margin-bottom:20px;
}

label{

    display:block;

    margin-bottom:8px;

    color:#e2e8f0;

    font-size:15px;
}

input{

    width:100%;

    padding:14px;

    border:none;

    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,0.12);

    color:white;

    font-size:15px;
}

input::placeholder{

    color:#cbd5e1;
}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:
    linear-gradient(
    to right,
    #38bdf8,
    #22c55e);

    color:white;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    transform:scale(1.04);

    box-shadow:0 0 20px #22c55e;
}

.msg{

    margin-top:18px;

    text-align:center;

    color:#f87171;

    font-weight:bold;
}

.admin-info{

    margin-top:25px;

    text-align:center;

    color:#cbd5e1;

    font-size:14px;

    line-height:1.8;
}

</style>

</head>

<body>

<div class="login-box">

    <h2>🔐 Admin Login</h2>

    <div class="input-group">

        <label>👤 Username</label>

        <input type="text"
        id="username"
        placeholder="Enter Username">

    </div>

    <div class="input-group">

        <label>🔑 Password</label>

        <input type="password"
        id="password"
        placeholder="Enter Password">

    </div>

    <button onclick="login()">

        🚀 Login to Dashboard

    </button>

    <div class="msg" id="msg"></div>

    <div class="admin-info">

        💼 Secure CRM Access <br>

        📊 Manage Leads Professionally

    </div>

</div>

<script>

function login(){

    const username =
    document.getElementById('username').value;

    const password =
    document.getElementById('password').value;

    if(username === 'admin' &&
    password === 'admin123'){

        localStorage.setItem('admin','true');

        window.location.href = 'dashboard.html';
    }

    else{

        document.getElementById('msg').innerHTML =
        '❌ Invalid Credentials';
    }
}

</script>

</body>

</html>
