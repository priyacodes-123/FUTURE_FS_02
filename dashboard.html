<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini CRM Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:
    linear-gradient(
    135deg,
    #020617,
    #0f172a,
    #052e16,
    #0c4a6e);

    background-size:400% 400%;

    animation:bgMove 10s ease infinite;

    padding:30px;

    min-height:100vh;
}

@keyframes bgMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

header{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.1);

    padding:22px;

    border-radius:18px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:30px;

    box-shadow:0 0 20px rgba(0,255,255,0.2);
}

header h1{

    color:#38bdf8;

    font-size:34px;

    text-shadow:0 0 10px #38bdf8;
}

.logout{

    background:#ef4444;

    color:white;

    border:none;

    padding:12px 20px;

    border-radius:10px;

    cursor:pointer;

    font-weight:bold;

    transition:0.3s;
}

.logout:hover{

    background:#dc2626;

    transform:scale(1.05);
}

.form-section{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.1);

    padding:30px;

    border-radius:18px;

    margin-bottom:30px;

    box-shadow:0 0 20px rgba(0,255,255,0.15);
}

.form-section h2{

    margin-bottom:20px;

    color:#4ade80;

    font-size:28px;
}

input,
textarea,
select{

    width:100%;

    padding:15px;

    margin:12px 0;

    border:none;

    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,0.12);

    color:white;

    font-size:15px;
}

input::placeholder,
textarea::placeholder{

    color:#d1d5db;
}

.add-btn{

    background:linear-gradient(to right,#38bdf8,#22c55e);

    color:white;

    border:none;

    padding:15px 24px;

    border-radius:12px;

    font-weight:bold;

    cursor:pointer;

    font-size:16px;

    transition:0.3s;
}

.add-btn:hover{

    transform:scale(1.05);

    box-shadow:0 0 20px #22c55e;
}

.table-section{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.1);

    padding:30px;

    border-radius:18px;

    box-shadow:0 0 20px rgba(0,255,255,0.15);
}

.table-section h2{

    margin-bottom:25px;

    color:#38bdf8;

    font-size:30px;
}

.table-container{

    display:flex;

    flex-direction:column;

    gap:25px;
}

.lead-card{

    background:rgba(255,255,255,0.1);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:18px;

    padding:25px;

    color:white;

    animation:blink 2.5s infinite;

    box-shadow:0 0 18px rgba(34,197,94,0.25);

    transition:0.3s;
}

.lead-card:hover{

    transform:translateY(-5px);

    box-shadow:0 0 25px rgba(56,189,248,0.5);
}

@keyframes blink{

    0%{
        box-shadow:0 0 10px rgba(34,197,94,0.2);
    }

    50%{
        box-shadow:0 0 25px rgba(56,189,248,0.6);
    }

    100%{
        box-shadow:0 0 10px rgba(34,197,94,0.2);
    }
}

.lead-card h3{

    color:#4ade80;

    margin-bottom:15px;

    font-size:24px;
}

.lead-card p{

    margin:10px 0;

    font-size:16px;

    color:#e2e8f0;
}

.status-new{

    background:#2563eb;

    color:white;

    padding:8px 14px;

    border-radius:20px;

    font-weight:bold;
}

.status-contacted{

    background:#f59e0b;

    color:white;

    padding:8px 14px;

    border-radius:20px;

    font-weight:bold;
}

.status-converted{

    background:#22c55e;

    color:white;

    padding:8px 14px;

    border-radius:20px;

    font-weight:bold;
}

.delete-btn{

    margin-top:15px;

    background:#ef4444;

    color:white;

    border:none;

    padding:12px 18px;

    border-radius:10px;

    cursor:pointer;

    font-weight:bold;

    transition:0.3s;
}

.delete-btn:hover{

    background:#dc2626;

    transform:scale(1.05);
}

@media(max-width:768px){

    header{

        flex-direction:column;

        gap:15px;
    }
}

</style>

</head>

<body>

<header>

    <h1>📊 Mini CRM Dashboard</h1>

    <button class="logout" onclick="logout()">

        Logout

    </button>

</header>


<div class="form-section">

    <h2>➕ Add New Lead</h2>

    <input type="text" id="name" placeholder="👤 Client Name">

    <input type="email" id="email" placeholder="📧 Client Email">

    <input type="text" id="source" placeholder="🌐 Lead Source">

    <select id="status">

        <option value="New">🟢 New</option>

        <option value="Contacted">🟡 Contacted</option>

        <option value="Converted">🔵 Converted</option>

    </select>

    <textarea id="notes" rows="4"
    placeholder="📝 Follow-up Notes"></textarea>

    <button class="add-btn" onclick="addLead()">

        ➕ Add Lead

    </button>

</div>


<div class="table-section">

    <h2>📋 Lead Management</h2>

    <div class="table-container" id="leadTable"></div>

</div>


<script>

if(localStorage.getItem('admin') !== 'true'){

    window.location.href = 'login.html';
}

const API = 'http://localhost:5000';


async function addLead(){

    const lead = {

        name: document.getElementById('name').value,

        email: document.getElementById('email').value,

        source: document.getElementById('source').value,

        status: document.getElementById('status').value,

        notes: document.getElementById('notes').value
    };

    await fetch(`${API}/addLead`,{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify(lead)
    });

    loadLeads();

    document.getElementById('name').value = '';

    document.getElementById('email').value = '';

    document.getElementById('source').value = '';

    document.getElementById('notes').value = '';
}


async function loadLeads(){

    const response = await fetch(`${API}/leads`);

    const leads = await response.json();

    const table = document.getElementById('leadTable');

    table.innerHTML = '';

    leads.forEach((lead)=>{

        let statusClass = '';

        if(lead.status === 'New'){

            statusClass = 'status-new';
        }

        else if(lead.status === 'Contacted'){

            statusClass = 'status-contacted';
        }

        else{

            statusClass = 'status-converted';
        }

        table.innerHTML += `

        <div class="lead-card">

            <h3>👤 ${lead.name}</h3>

            <p><strong>📧 Email:</strong> ${lead.email}</p>

            <p><strong>🌐 Source:</strong> ${lead.source}</p>

            <p>

                <strong>📌 Status:</strong>

                <span class="${statusClass}">
                    ${lead.status}
                </span>

            </p>

            <br>

            <select onchange="updateStatus('${lead._id}', this.value)">

                <option value="New"
                ${lead.status==='New'?'selected':''}>
                🟢 New
                </option>

                <option value="Contacted"
                ${lead.status==='Contacted'?'selected':''}>
                🟡 Contacted
                </option>

                <option value="Converted"
                ${lead.status==='Converted'?'selected':''}>
                🔵 Converted
                </option>

            </select>

            <p>

                <strong>📝 Notes:</strong>

                ${lead.notes}

            </p>

            <button class="delete-btn"
            onclick="deleteLead('${lead._id}')">

                ❌ Delete Lead

            </button>

        </div>

        `;
    });
}


async function updateStatus(id,status){

    await fetch(`${API}/updateLead/${id}`,{

        method:'PUT',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({status})
    });

    loadLeads();
}


async function deleteLead(id){

    await fetch(`${API}/deleteLead/${id}`,{

        method:'DELETE'
    });

    loadLeads();
}


function logout(){

    localStorage.removeItem('admin');

    window.location.href = 'login.html';
}

loadLeads();

</script>

</body>
</html>
