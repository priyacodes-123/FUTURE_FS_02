<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini CRM</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(to right,#0f172a,#1e293b);
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            text-align:center;
            width:90%;
            max-width:700px;
        }

        h1{
            font-size:52px;
            margin-bottom:20px;
            color:#38bdf8;
        }

        p{
            font-size:20px;
            line-height:1.7;
            margin-bottom:40px;
            color:#cbd5e1;
        }

        .btn{
            background:#38bdf8;
            color:black;
            text-decoration:none;
            padding:15px 35px;
            border-radius:8px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:white;
            transform:scale(1.05);
        }

    </style>
</head>
<body>

<div class="container">

    <h1>Client Lead Management System</h1>

    <p>
        Professional CRM application to manage leads,
        update status, track follow-ups,
        and organize client information efficiently.
    </p>

    <a href="login.html" class="btn">Admin Login</a>

</div>

</body>
</html>
